# Local development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    image: teacher-lesson-planner/backend:dev
    build:
      context: ./backend
      target: development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development

  celery:
    image: teacher-lesson-planner/backend:dev
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend:/app
    environment:
      ENVIRONMENT: development

  frontend:
    image: teacher-lesson-planner/frontend:dev
    build:
      context: ./frontend
      target: development
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000

  nginx:
    ports:
      - "80:80"
